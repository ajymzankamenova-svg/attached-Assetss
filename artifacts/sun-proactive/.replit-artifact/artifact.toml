kind = "web"
previewPath = "/"
title = "Sun Proactive AI"
version = "1.0.0"
id = "artifacts/sun-proactive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20862

[services.development]
run = "pnpm --filter @workspace/sun-proactive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sun-proactive", "run", "build" ]
publicDir = "artifacts/sun-proactive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20862"
BASE_PATH = "/"
